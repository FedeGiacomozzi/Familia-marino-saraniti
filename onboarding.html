<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Familia Mariño — Comenzar</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Lato', sans-serif;
  background: #fdf6ed;
  min-height: 100vh;
  color: #3d2b0a;
}

.header {
  background: #fdf6ed;
  border-bottom: 1px solid #c8a96e;
  padding: 24px 20px;
  text-align: center;
}

.header h1 {
  font-family: 'Playfair Display', serif;
  font-size: 28px;
  color: #3d2b0a;
  font-weight: 400;
}

.header p {
  font-size: 13px;
  color: #8b6914;
  margin-top: 6px;
  letter-spacing: 2px;
  text-transform: uppercase;
}

.container {
  max-width: 640px;
  margin: 0 auto;
  padding: 40px 20px 80px;
}

.seccion {
  background: #fff;
  border: 1px solid #e8d9b8;
  border-radius: 12px;
  padding: 28px;
  margin-bottom: 24px;
}

.seccion h2 {
  font-family: 'Playfair Display', serif;
  font-size: 18px;
  font-weight: 400;
  margin-bottom: 6px;
  color: #3d2b0a;
}

.seccion-sub {
  font-size: 12px;
  color: #8b6914;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 20px;
}

label {
  display: block;
  font-size: 12px;
  color: #8b6914;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 6px;
  margin-top: 16px;
}

label:first-of-type { margin-top: 0; }

input[type="text"],
input[type="email"],
input[type="date"],
select {
  width: 100%;
  padding: 12px 16px;
  border: 1px solid #e8d9b8;
  border-radius: 8px;
  font-size: 15px;
  font-family: 'Lato', sans-serif;
  color: #3d2b0a;
  background: #fdf6ed;
  outline: none;
  appearance: none;
  -webkit-appearance: none;
}

input[type="text"]:focus,
input[type="email"]:focus,
input[type="date"]:focus,
select:focus { border-color: #c8a96e; }

.select-wrap {
  position: relative;
}

.select-wrap::after {
  content: '▾';
  position: absolute;
  right: 14px;
  top: 50%;
  transform: translateY(-50%);
  color: #c8a96e;
  pointer-events: none;
  font-size: 14px;
}

.checkbox-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 16px;
  cursor: pointer;
  user-select: none;
}

.checkbox-row input[type="checkbox"] {
  width: 18px;
  height: 18px;
  accent-color: #3d2b0a;
  cursor: pointer;
  flex-shrink: 0;
}

.checkbox-row span {
  font-size: 14px;
  color: #3d2b0a;
}

.integrante-card {
  background: #fdf6ed;
  border: 1px solid #e8d9b8;
  border-radius: 10px;
  padding: 18px 20px;
  margin-bottom: 12px;
  position: relative;
}

.integrante-card .num {
  font-size: 11px;
  color: #c8a96e;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 12px;
}

.integrante-card label {
  color: #8b6914;
  margin-top: 12px;
}

.integrante-card label:first-of-type { margin-top: 0; }

.integrante-card input,
.integrante-card select {
  background: #fff;
}

.btn-quitar {
  position: absolute;
  top: 14px;
  right: 16px;
  background: none;
  border: none;
  color: #c8a96e;
  font-size: 18px;
  cursor: pointer;
  line-height: 1;
  padding: 0;
  font-family: 'Lato', sans-serif;
}

.btn-quitar:hover { color: #c8522a; }

.menor-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 12px;
  cursor: pointer;
}

.menor-row input[type="checkbox"] {
  width: 16px;
  height: 16px;
  accent-color: #3d2b0a;
  cursor: pointer;
}

.menor-row span {
  font-size: 13px;
  color: #8b6914;
}

.btn-agregar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 20px;
  border: 1.5px dashed #c8a96e;
  border-radius: 99px;
  background: transparent;
  color: #5a3e1a;
  font-size: 14px;
  font-family: 'Lato', sans-serif;
  cursor: pointer;
  transition: all 0.2s;
  margin-top: 4px;
}

.btn-agregar:hover { border-style: solid; background: #fdf6ed; }
.btn-agregar:disabled { opacity: 0.4; cursor: not-allowed; }

.btn-submit {
  width: 100%;
  margin-top: 8px;
  padding: 14px;
  background: #3d2b0a;
  color: #fdf6ed;
  border: none;
  border-radius: 8px;
  font-size: 15px;
  font-family: 'Lato', sans-serif;
  cursor: pointer;
  letter-spacing: 1px;
  transition: background 0.2s;
}

.btn-submit:hover { background: #5a3e1a; }
.btn-submit:disabled { opacity: 0.4; cursor: not-allowed; }

.error-msg {
  font-size: 13px;
  color: #c8522a;
  margin-top: 12px;
  min-height: 18px;
}

/* Confirmación */
.confirmacion {
  position: fixed;
  inset: 0;
  background: #fdf6ed;
  z-index: 100;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding: 60px 24px 40px;
  overflow-y: auto;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.8s ease;
}

.confirmacion.visible {
  opacity: 1;
  pointer-events: all;
}

.conf-linea {
  width: 40px;
  height: 1px;
  background: #c8a96e;
  margin: 0 auto 32px;
}

.conf-titulo {
  font-family: 'Playfair Display', serif;
  font-size: 30px;
  font-weight: 400;
  color: #3d2b0a;
  line-height: 1.3;
  margin-bottom: 12px;
  max-width: 480px;
  text-align: center;
}

.conf-sub {
  font-size: 13px;
  color: #8b6914;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-bottom: 40px;
  text-align: center;
}

.conf-links {
  width: 100%;
  max-width: 560px;
}

.conf-links-titulo {
  font-family: 'Playfair Display', serif;
  font-size: 16px;
  font-weight: 400;
  color: #3d2b0a;
  margin-bottom: 16px;
  text-align: center;
}

.link-card {
  background: #fff;
  border: 1px solid #e8d9b8;
  border-radius: 10px;
  padding: 16px 20px;
  margin-bottom: 10px;
}

.link-nombre {
  font-size: 14px;
  color: #3d2b0a;
  font-weight: 400;
  margin-bottom: 4px;
}

.link-relacion {
  font-size: 11px;
  color: #8b6914;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 8px;
}

.link-url {
  font-size: 12px;
  color: #5a3e1a;
  word-break: break-all;
  background: #fdf6ed;
  border: 1px solid #e8d9b8;
  border-radius: 6px;
  padding: 8px 12px;
  font-family: monospace;
  display: block;
  text-decoration: none;
}

.link-url:hover { border-color: #c8a96e; }

.conf-firma {
  font-family: 'Playfair Display', serif;
  font-size: 15px;
  font-style: italic;
  color: #c8a96e;
  margin-top: 40px;
  text-align: center;
}
</style>
</head>
<body>

<div class="header">
  <h1>Familia Mariño — Saraniti</h1>
  <p>Empezar el libro</p>
</div>

<div class="container" id="formulario">

  <!-- Sección 1: datos de quien compra -->
  <div class="seccion">
    <h2>¿Quién organiza el libro?</h2>
    <p class="seccion-sub">Datos del comprador</p>

    <label for="comp-nombre">Tu nombre</label>
    <input type="text" id="comp-nombre" placeholder="Nombre y apellido" />

    <label for="comp-email">Tu email</label>
    <input type="email" id="comp-email" placeholder="Para recibir el libro cuando esté listo" />

    <label class="checkbox-row" style="margin-top:16px; text-transform:none; letter-spacing:0; font-size:14px; color:#3d2b0a;">
      <input type="checkbox" id="comp-es-retratado" />
      <span>Yo también quiero ser entrevistado/a</span>
    </label>
  </div>

  <!-- Sección 2: datos de la familia -->
  <div class="seccion">
    <h2>¿De qué familia se trata?</h2>
    <p class="seccion-sub">Datos generales</p>

    <label for="nombre-familia">Nombre de la familia</label>
    <input type="text" id="nombre-familia" placeholder="ej: Familia Rodríguez" />

    <label for="pais">País</label>
    <div class="select-wrap">
      <select id="pais">
        <option value="argentina" selected>Argentina</option>
        <option value="bolivia">Bolivia</option>
        <option value="brasil">Brasil</option>
        <option value="chile">Chile</option>
        <option value="colombia">Colombia</option>
        <option value="costa_rica">Costa Rica</option>
        <option value="cuba">Cuba</option>
        <option value="ecuador">Ecuador</option>
        <option value="el_salvador">El Salvador</option>
        <option value="españa">España</option>
        <option value="guatemala">Guatemala</option>
        <option value="honduras">Honduras</option>
        <option value="mexico">México</option>
        <option value="nicaragua">Nicaragua</option>
        <option value="panama">Panamá</option>
        <option value="paraguay">Paraguay</option>
        <option value="peru">Perú</option>
        <option value="republica_dominicana">República Dominicana</option>
        <option value="uruguay">Uruguay</option>
        <option value="venezuela">Venezuela</option>
      </select>
    </div>
  </div>

  <!-- Sección 3: integrantes -->
  <div class="seccion">
    <h2>¿Quiénes participan?</h2>
    <p class="seccion-sub">Personas a entrevistar</p>

    <div id="integrantes-container"></div>

    <button class="btn-agregar" id="btn-agregar" onclick="agregarIntegrante()">
      + Agregar otra persona
    </button>
  </div>

  <div class="seccion" style="border:none; background:none; padding:0;">
    <button class="btn-submit" id="btn-submit" onclick="enviar()">Confirmar y generar links →</button>
    <div class="error-msg" id="error-msg"></div>
  </div>

</div>

<!-- Pantalla de confirmación -->
<div class="confirmacion" id="confirmacion">
  <div class="conf-linea"></div>
  <div class="conf-titulo">¡Listo! Estos son los links de cada persona.</div>
  <div class="conf-sub">Compartí cada link con quien corresponde</div>
  <div class="conf-links">
    <div class="conf-links-titulo" id="conf-familia-nombre"></div>
    <div id="conf-links-lista"></div>
  </div>
  <div class="conf-firma">— Familia Mariño · Saraniti</div>
</div>

<script>
const API_URL = 'https://familia-pipeline-776445604502.us-central1.run.app';
const RECORDING_BASE = 'https://fedegiacomozzi.github.io/familia-marino/recording.html';

const RELACIONES = [
  { value: 'padre',    label: 'Padre' },
  { value: 'madre',    label: 'Madre' },
  { value: 'abuelo',   label: 'Abuelo' },
  { value: 'abuela',   label: 'Abuela' },
  { value: 'tio',      label: 'Tío' },
  { value: 'tia',      label: 'Tía' },
  { value: 'hermano',  label: 'Hermano' },
  { value: 'hermana',  label: 'Hermana' },
  { value: 'hijo',     label: 'Hijo' },
  { value: 'hija',     label: 'Hija' },
  { value: 'pareja',   label: 'Pareja / cónyuge' },
  { value: 'otro',     label: 'Otro' },
];

let counter = 0;

function opcionesRelacion() {
  return RELACIONES.map(r => `<option value="${r.value}">${r.label}</option>`).join('');
}

function agregarIntegrante() {
  counter++;
  const id = counter;
  const div = document.createElement('div');
  div.className = 'integrante-card';
  div.id = 'int-' + id;
  div.innerHTML = `
    <div class="num">Persona ${id}</div>
    <button class="btn-quitar" onclick="quitarIntegrante(${id})" title="Quitar">×</button>
    <label>Nombre completo</label>
    <input type="text" id="int-nombre-${id}" placeholder="Nombre y apellido" />
    <label>Relación con el organizador</label>
    <div class="select-wrap">
      <select id="int-relacion-${id}">${opcionesRelacion()}</select>
    </div>
    <label class="menor-row" style="text-transform:none;letter-spacing:0;font-size:13px;color:#8b6914;margin-top:12px;">
      <input type="checkbox" id="int-menor-${id}" />
      <span>Es menor de edad</span>
    </label>
  `;
  document.getElementById('integrantes-container').appendChild(div);
  actualizarBotones();
}

function quitarIntegrante(id) {
  if (document.querySelectorAll('.integrante-card').length <= 1) return;
  document.getElementById('int-' + id)?.remove();
  actualizarBotones();
}

function actualizarBotones() {
  const cards = document.querySelectorAll('.integrante-card');
  cards.forEach(c => {
    const btn = c.querySelector('.btn-quitar');
    if (btn) btn.style.display = cards.length <= 1 ? 'none' : '';
  });
}

function getIntegrantes() {
  return Array.from(document.querySelectorAll('.integrante-card')).map(c => {
    const m = c.id.match(/int-(\d+)/);
    const id = m ? m[1] : null;
    return {
      nombre:                document.getElementById('int-nombre-' + id)?.value.trim() || '',
      relacion_con_comprador: document.getElementById('int-relacion-' + id)?.value || '',
      es_menor:              document.getElementById('int-menor-' + id)?.checked || false,
    };
  });
}

async function enviar() {
  const compNombre    = document.getElementById('comp-nombre').value.trim();
  const compEmail     = document.getElementById('comp-email').value.trim();
  const esRetratado   = document.getElementById('comp-es-retratado').checked;
  const nombreFamilia = document.getElementById('nombre-familia').value.trim();
  const pais          = document.getElementById('pais').value;
  const integrantes   = getIntegrantes();
  const errorEl       = document.getElementById('error-msg');

  errorEl.textContent = '';

  if (!compNombre)   { errorEl.textContent = 'Escribí tu nombre.'; return; }
  if (!compEmail || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(compEmail)) {
    errorEl.textContent = 'Ingresá un email válido.'; return;
  }
  if (!nombreFamilia) { errorEl.textContent = 'Escribí el nombre de la familia.'; return; }
  if (integrantes.some(i => !i.nombre)) {
    errorEl.textContent = 'Completá el nombre de todos los integrantes.'; return;
  }

  const btn = document.getElementById('btn-submit');
  btn.disabled = true;
  btn.textContent = 'Creando familia…';

  try {
    // Paso 1: crear la familia
    const res1 = await fetch(API_URL + '/familia', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        nombre: nombreFamilia,
        comprador: { nombre: compNombre, email: compEmail, es_tambien_retratado: esRetratado },
        pack: 'base',
        pais,
      }),
    });
    if (!res1.ok) {
      const d = await res1.json().catch(() => ({}));
      throw new Error(d.detail || `Error ${res1.status}`);
    }
    const { familia_id, token_comprador } = await res1.json();

    btn.textContent = 'Agregando integrantes…';

    // Paso 2: agregar cada integrante
    const tokens = [];

    if (token_comprador) {
      tokens.push({ nombre: compNombre, relacion: 'comprador', token: token_comprador });
    }

    for (const int of integrantes) {
      const res2 = await fetch(`${API_URL}/familia/${familia_id}/integrantes`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          nombre: int.nombre,
          relacion_con_comprador: int.relacion_con_comprador,
          es_menor: int.es_menor,
        }),
      });
      if (!res2.ok) {
        const d = await res2.json().catch(() => ({}));
        throw new Error(`${int.nombre}: ${d.detail || res2.status}`);
      }
      const { token_unico } = await res2.json();
      tokens.push({ nombre: int.nombre, relacion: int.relacion_con_comprador, token: token_unico });
    }

    mostrarConfirmacion(nombreFamilia, tokens);

  } catch (e) {
    errorEl.textContent = 'Error: ' + e.message;
    btn.disabled = false;
    btn.textContent = 'Confirmar y generar links →';
  }
}

function mostrarConfirmacion(nombreFamilia, tokens) {
  document.getElementById('conf-familia-nombre').textContent = nombreFamilia;
  document.getElementById('conf-links-lista').innerHTML = tokens.map(t => {
    const link = `${RECORDING_BASE}?token=${t.token}`;
    return `
      <div class="link-card">
        <div class="link-nombre">${t.nombre}</div>
        <div class="link-relacion">${t.relacion}</div>
        <a class="link-url" href="${link}" target="_blank">${link}</a>
      </div>`;
  }).join('');
  document.getElementById('confirmacion').classList.add('visible');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// Iniciar con un integrante vacío
agregarIntegrante();
</script>
</body>
</html>
