<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Familia Mariño — Comenzar</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Lato', sans-serif;
  background: #fdf6ed;
  min-height: 100vh;
  color: #3d2b0a;
}

.header {
  background: #fdf6ed;
  border-bottom: 1px solid #c8a96e;
  padding: 24px 20px;
  text-align: center;
}

.header h1 {
  font-family: 'Playfair Display', serif;
  font-size: 28px;
  color: #3d2b0a;
  font-weight: 400;
}

.header p {
  font-size: 13px;
  color: #8b6914;
  margin-top: 6px;
  letter-spacing: 2px;
  text-transform: uppercase;
}

.container {
  max-width: 640px;
  margin: 0 auto;
  padding: 40px 20px 80px;
}

.seccion {
  background: #fff;
  border: 1px solid #e8d9b8;
  border-radius: 12px;
  padding: 28px;
  margin-bottom: 24px;
}

.seccion h2 {
  font-family: 'Playfair Display', serif;
  font-size: 18px;
  font-weight: 400;
  margin-bottom: 6px;
  color: #3d2b0a;
}

.seccion-sub {
  font-size: 12px;
  color: #8b6914;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 20px;
}

label {
  display: block;
  font-size: 12px;
  color: #8b6914;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 6px;
  margin-top: 16px;
}

label:first-of-type { margin-top: 0; }

input[type="text"],
input[type="email"],
select {
  width: 100%;
  padding: 12px 16px;
  border: 1px solid #e8d9b8;
  border-radius: 8px;
  font-size: 15px;
  font-family: 'Lato', sans-serif;
  color: #3d2b0a;
  background: #fdf6ed;
  outline: none;
  appearance: none;
  -webkit-appearance: none;
}

input[type="text"]:focus,
input[type="email"]:focus,
select:focus { border-color: #c8a96e; }

.select-wrap {
  position: relative;
}

.select-wrap::after {
  content: '▾';
  position: absolute;
  right: 14px;
  top: 50%;
  transform: translateY(-50%);
  color: #c8a96e;
  pointer-events: none;
  font-size: 14px;
}

.integrante-card {
  background: #fdf6ed;
  border: 1px solid #e8d9b8;
  border-radius: 10px;
  padding: 18px 20px;
  margin-bottom: 12px;
  position: relative;
}

.integrante-card .num {
  font-size: 11px;
  color: #c8a96e;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 12px;
}

.integrante-card label {
  color: #8b6914;
  margin-top: 12px;
}

.integrante-card label:first-of-type { margin-top: 0; }

.integrante-card input,
.integrante-card select {
  background: #fff;
}

.btn-quitar {
  position: absolute;
  top: 14px;
  right: 16px;
  background: none;
  border: none;
  color: #c8a96e;
  font-size: 18px;
  cursor: pointer;
  line-height: 1;
  padding: 0;
  font-family: 'Lato', sans-serif;
}

.btn-quitar:hover { color: #c8522a; }

.btn-agregar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 20px;
  border: 1.5px dashed #c8a96e;
  border-radius: 99px;
  background: transparent;
  color: #5a3e1a;
  font-size: 14px;
  font-family: 'Lato', sans-serif;
  cursor: pointer;
  transition: all 0.2s;
  margin-top: 4px;
}

.btn-agregar:hover { border-style: solid; background: #fdf6ed; }
.btn-agregar:disabled { opacity: 0.4; cursor: not-allowed; }

.btn-submit {
  width: 100%;
  margin-top: 8px;
  padding: 14px;
  background: #3d2b0a;
  color: #fdf6ed;
  border: none;
  border-radius: 8px;
  font-size: 15px;
  font-family: 'Lato', sans-serif;
  cursor: pointer;
  letter-spacing: 1px;
  transition: background 0.2s;
}

.btn-submit:hover { background: #5a3e1a; }
.btn-submit:disabled { opacity: 0.4; cursor: not-allowed; }

.error-msg {
  font-size: 13px;
  color: #c8522a;
  margin-top: 12px;
  min-height: 18px;
}

/* Pantalla de confirmación */
.confirmacion {
  position: fixed;
  inset: 0;
  background: #fdf6ed;
  z-index: 100;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding: 60px 24px 40px;
  overflow-y: auto;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.8s ease;
}

.confirmacion.visible {
  opacity: 1;
  pointer-events: all;
}

.conf-linea {
  width: 40px;
  height: 1px;
  background: #c8a96e;
  margin: 0 auto 32px;
}

.conf-titulo {
  font-family: 'Playfair Display', serif;
  font-size: 30px;
  font-weight: 400;
  color: #3d2b0a;
  line-height: 1.3;
  margin-bottom: 12px;
  max-width: 480px;
  text-align: center;
}

.conf-sub {
  font-size: 13px;
  color: #8b6914;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-bottom: 40px;
  text-align: center;
}

.conf-links {
  width: 100%;
  max-width: 560px;
}

.conf-links-titulo {
  font-family: 'Playfair Display', serif;
  font-size: 16px;
  font-weight: 400;
  color: #3d2b0a;
  margin-bottom: 16px;
  text-align: center;
}

.link-card {
  background: #fff;
  border: 1px solid #e8d9b8;
  border-radius: 10px;
  padding: 16px 20px;
  margin-bottom: 10px;
}

.link-nombre {
  font-size: 14px;
  color: #3d2b0a;
  font-weight: 400;
  margin-bottom: 6px;
}

.link-relacion {
  font-size: 11px;
  color: #8b6914;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 8px;
}

.link-url {
  font-size: 12px;
  color: #5a3e1a;
  word-break: break-all;
  background: #fdf6ed;
  border: 1px solid #e8d9b8;
  border-radius: 6px;
  padding: 8px 12px;
  font-family: monospace;
  display: block;
}

.conf-firma {
  font-family: 'Playfair Display', serif;
  font-size: 15px;
  font-style: italic;
  color: #c8a96e;
  margin-top: 40px;
  margin-bottom: 8px;
  text-align: center;
}
</style>
</head>
<body>

<div class="header">
  <h1>Familia Mariño — Saraniti</h1>
  <p>Empezar el libro</p>
</div>

<div class="container" id="formulario">

  <div class="seccion">
    <h2>¿De qué familia se trata?</h2>
    <p class="seccion-sub">Datos generales</p>

    <label for="nombre-familia">Nombre de la familia</label>
    <input type="text" id="nombre-familia" placeholder="ej: Familia Rodríguez" />

    <label for="email-comprador">Tu email</label>
    <input type="email" id="email-comprador" placeholder="Para recibir el libro cuando esté listo" />

    <label for="pais">País</label>
    <div class="select-wrap">
      <select id="pais">
        <option value="argentina" selected>Argentina</option>
        <option value="bolivia">Bolivia</option>
        <option value="brasil">Brasil</option>
        <option value="chile">Chile</option>
        <option value="colombia">Colombia</option>
        <option value="costa_rica">Costa Rica</option>
        <option value="cuba">Cuba</option>
        <option value="ecuador">Ecuador</option>
        <option value="el_salvador">El Salvador</option>
        <option value="españa">España</option>
        <option value="guatemala">Guatemala</option>
        <option value="honduras">Honduras</option>
        <option value="mexico">México</option>
        <option value="nicaragua">Nicaragua</option>
        <option value="panama">Panamá</option>
        <option value="paraguay">Paraguay</option>
        <option value="peru">Perú</option>
        <option value="republica_dominicana">República Dominicana</option>
        <option value="uruguay">Uruguay</option>
        <option value="venezuela">Venezuela</option>
      </select>
    </div>
  </div>

  <div class="seccion">
    <h2>¿Quiénes participan?</h2>
    <p class="seccion-sub">Agregá a cada integrante</p>

    <div id="integrantes-container"></div>

    <button class="btn-agregar" id="btn-agregar" onclick="agregarIntegrante()">
      + Agregar otra persona
    </button>
  </div>

  <div class="seccion" style="border:none; background:none; padding:0;">
    <button class="btn-submit" id="btn-submit" onclick="enviar()">Confirmar y generar links →</button>
    <div class="error-msg" id="error-msg"></div>
  </div>

</div>

<div class="confirmacion" id="confirmacion">
  <div class="conf-linea"></div>
  <div class="conf-titulo">¡Listo! Enviamos los links a cada persona.</div>
  <div class="conf-sub">Cada uno recibirá su link para grabar</div>
  <div class="conf-links">
    <div class="conf-links-titulo" id="conf-familia-nombre"></div>
    <div id="conf-links-lista"></div>
  </div>
  <div class="conf-firma">— Familia Mariño · Saraniti</div>
</div>

<script>
const API_URL = 'https://familia-pipeline-776445604502.us-central1.run.app/familia';

const RELACIONES = [
  { value: 'padre',    label: 'Padre' },
  { value: 'madre',    label: 'Madre' },
  { value: 'abuelo',   label: 'Abuelo' },
  { value: 'abuela',   label: 'Abuela' },
  { value: 'tio',      label: 'Tío' },
  { value: 'tia',      label: 'Tía' },
  { value: 'hermano',  label: 'Hermano' },
  { value: 'hermana',  label: 'Hermana' },
  { value: 'hijo',     label: 'Hijo' },
  { value: 'hija',     label: 'Hija' },
  { value: 'pareja',   label: 'Pareja / cónyuge' },
  { value: 'otro',     label: 'Otro' },
];

let contadorIntegrantes = 0;

function opcionesRelacion(seleccionado) {
  return RELACIONES.map(r =>
    `<option value="${r.value}"${r.value === seleccionado ? ' selected' : ''}>${r.label}</option>`
  ).join('');
}

function agregarIntegrante(nombre = '', relacion = '') {
  contadorIntegrantes++;
  const id = contadorIntegrantes;
  const container = document.getElementById('integrantes-container');

  const div = document.createElement('div');
  div.className = 'integrante-card';
  div.id = 'integrante-' + id;
  div.innerHTML = `
    <div class="num">Persona ${id}</div>
    <button class="btn-quitar" onclick="quitarIntegrante(${id})" title="Quitar">×</button>
    <label>Nombre completo</label>
    <input type="text" id="nombre-int-${id}" placeholder="Nombre y apellido" value="${nombre}" />
    <label>Relación con vos</label>
    <div class="select-wrap">
      <select id="relacion-int-${id}">
        ${opcionesRelacion(relacion)}
      </select>
    </div>
  `;
  container.appendChild(div);
  actualizarBotones();
}

function quitarIntegrante(id) {
  const total = document.querySelectorAll('.integrante-card').length;
  if (total <= 1) return;
  const card = document.getElementById('integrante-' + id);
  if (card) card.remove();
  actualizarBotones();
}

function actualizarBotones() {
  const cards = document.querySelectorAll('.integrante-card');
  cards.forEach(card => {
    const btn = card.querySelector('.btn-quitar');
    if (btn) btn.style.display = cards.length <= 1 ? 'none' : '';
  });
}

function getIntegrantes() {
  const cards = document.querySelectorAll('.integrante-card');
  return Array.from(cards).map(card => {
    const idMatch = card.id.match(/integrante-(\d+)/);
    const id = idMatch ? idMatch[1] : null;
    return {
      nombre:   document.getElementById('nombre-int-' + id)?.value.trim() || '',
      relacion: document.getElementById('relacion-int-' + id)?.value || '',
    };
  });
}

async function enviar() {
  const nombreFamilia   = document.getElementById('nombre-familia').value.trim();
  const emailComprador  = document.getElementById('email-comprador').value.trim();
  const pais            = document.getElementById('pais').value;
  const integrantes     = getIntegrantes();
  const errorEl         = document.getElementById('error-msg');

  errorEl.textContent = '';

  if (!nombreFamilia) { errorEl.textContent = 'Escribí el nombre de la familia.'; return; }
  if (!emailComprador || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailComprador)) {
    errorEl.textContent = 'Ingresá un email válido.';
    return;
  }
  const sinNombre = integrantes.find(i => !i.nombre);
  if (sinNombre) { errorEl.textContent = 'Completá el nombre de todos los integrantes.'; return; }

  const btn = document.getElementById('btn-submit');
  btn.disabled = true;
  btn.textContent = 'Enviando...';

  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        nombre_familia:  nombreFamilia,
        email_comprador: emailComprador,
        pais:            pais,
        integrantes:     integrantes,
      }),
    });

    if (!res.ok) {
      const data = await res.json().catch(() => ({}));
      throw new Error(data.detail || `Error ${res.status}`);
    }

    const data = await res.json();
    mostrarConfirmacion(nombreFamilia, data.tokens);

  } catch (e) {
    errorEl.textContent = 'Error al enviar: ' + e.message;
    btn.disabled = false;
    btn.textContent = 'Confirmar y generar links →';
  }
}

function mostrarConfirmacion(nombreFamilia, tokens) {
  document.getElementById('conf-familia-nombre').textContent = nombreFamilia;

  const lista = document.getElementById('conf-links-lista');
  lista.innerHTML = tokens.map(t => `
    <div class="link-card">
      <div class="link-nombre">${t.nombre}</div>
      <div class="link-relacion">${t.relacion}</div>
      <a class="link-url" href="${t.link}" target="_blank">${t.link}</a>
    </div>
  `).join('');

  document.getElementById('confirmacion').classList.add('visible');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// Iniciar con un integrante vacío
agregarIntegrante();
</script>
</body>
</html>
