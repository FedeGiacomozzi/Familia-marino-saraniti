<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Familia — Raíces</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Lato',sans-serif;background:#fdf8f2;color:#3d2b0a;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.card{background:#fff;border:0.5px solid #e8d9b8;border-radius:16px;padding:2.5rem 2rem;max-width:440px;width:100%;text-align:center}
.wordmark{font-family:'Playfair Display',serif;font-size:13px;letter-spacing:0.18em;text-transform:uppercase;color:#C4956A;margin-bottom:1.5rem}
h1{font-family:'Playfair Display',serif;font-size:26px;margin-bottom:0.5rem}
.sub{font-size:14px;color:#9a7b5a;margin-bottom:2rem;line-height:1.6}
.form-group{margin-bottom:1rem;text-align:left}
.form-group label{display:block;font-size:12px;color:#9a7b5a;margin-bottom:4px;letter-spacing:0.05em;text-transform:uppercase}
.form-group input{width:100%;border:0.5px solid #e8d9b8;border-radius:8px;padding:12px 14px;font-family:'Lato',sans-serif;font-size:15px;color:#3d2b0a;background:#fff}
.form-group input:focus{outline:none;border-color:#C4956A}
.btn{width:100%;background:#2C1A0E;color:#F5EDD8;border:none;padding:14px;border-radius:8px;font-family:'Lato',sans-serif;font-size:14px;font-weight:700;cursor:pointer;margin-top:0.5rem;letter-spacing:0.04em}
.btn:disabled{opacity:0.5;cursor:not-allowed}
.msg{font-size:14px;margin-top:1rem;padding:12px;border-radius:8px;display:none}
.msg.success{background:#EAF3DE;color:#3B6D11}
.msg.error{background:#FAEEDA;color:#854F0B}

/* DASHBOARD (se muestra cuando hay acceso válido) */
#dashboard{display:none}
.dash-header{background:#2C1A0E;padding:1.5rem 2rem;border-radius:12px 12px 0 0;text-align:center}
.dash-wordmark{font-family:'Playfair Display',serif;font-size:12px;letter-spacing:0.18em;color:#C4956A;text-transform:uppercase;margin-bottom:0.25rem}
.dash-familia{font-family:'Playfair Display',serif;font-size:20px;color:#F5EDD8}
.dash-body{padding:1.5rem}
.dash-progress-label{display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px}
.dash-progress-label span:first-child{color:#9a7b5a}
.dash-progress-label span:last-child{font-weight:700;color:#2C1A0E}
.dash-track{background:#f0e8d8;border-radius:100px;height:8px;margin-bottom:1.5rem;overflow:hidden}
.dash-fill{background:#2C1A0E;height:100%;border-radius:100px;transition:width 0.4s}
.dash-table{width:100%;border-collapse:collapse;font-size:14px;margin-bottom:1.5rem}
.dash-table th{text-align:left;font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:#9a7b5a;padding:0 0 8px;border-bottom:0.5px solid #e8d9b8}
.dash-table td{padding:10px 0;border-bottom:0.5px solid #f0e8d8;vertical-align:middle}
.dash-table td:last-child{text-align:right}
.badge-done{background:#EAF3DE;color:#3B6D11;font-size:11px;padding:3px 10px;border-radius:100px;font-weight:700}
.badge-prog{background:#FFF8E0;color:#8B6F0B;font-size:11px;padding:3px 10px;border-radius:100px}
.badge-pend{background:#f0e8d8;color:#9a7b5a;font-size:11px;padding:3px 10px;border-radius:100px}
.dash-actions{display:flex;flex-direction:column;gap:8px}
.dash-btn{padding:12px;border-radius:8px;border:none;font-family:'Lato',sans-serif;font-size:13px;font-weight:700;cursor:pointer;letter-spacing:0.03em}
.dash-btn.primary{background:#2C1A0E;color:#F5EDD8}
.dash-btn.secondary{background:transparent;border:0.5px solid #e8d9b8;color:#3d2b0a}
.dash-refresh{font-size:11px;color:#9a7b5a;text-align:right;margin-top:8px}
.dash-pdf-box{background:#EAF3DE;border:0.5px solid #c3dba8;border-radius:8px;padding:1rem;margin-bottom:1rem;text-align:center}
.dash-pdf-box strong{display:block;font-size:15px;color:#3B6D11;margin-bottom:4px}
.dash-pdf-box p{font-size:13px;color:#5a8a3a;margin-bottom:8px}
</style>
</head>
<body>

<!-- PANTALLA DE LOGIN -->
<div id="login-screen">
  <div class="card">
    <p class="wordmark">Raíces</p>
    <h1>Mi libro familiar</h1>
    <p class="sub">Ingresá el email con el que compraste para ver el progreso de tu libro.</p>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="inp-email" placeholder="tu@email.com" autocomplete="email">
    </div>
    <button class="btn" id="btn-acceder" onclick="solicitarAcceso()">Enviar link de acceso</button>
    <div class="msg" id="msg"></div>
  </div>
</div>

<!-- DASHBOARD (se carga con magic link ?ml=TOKEN) -->
<div id="dashboard" style="max-width:480px;width:100%">
  <div class="dash-header">
    <p class="dash-wordmark">Raíces</p>
    <p class="dash-familia" id="dash-nombre-fam">—</p>
  </div>
  <div style="background:#fff;border:0.5px solid #e8d9b8;border-radius:0 0 12px 12px">
    <div class="dash-body">
      <div id="dash-pdf-box" class="dash-pdf-box" style="display:none">
        <strong>🎉 ¡Tu libro está listo!</strong>
        <p>El PDF está disponible para descargar.</p>
        <button class="dash-btn primary" id="btn-pdf" onclick="descargarPdf()">Descargar PDF ↓</button>
      </div>
      <div class="dash-progress-label">
        <span id="dash-prog-txt">Cargando…</span>
        <span id="dash-pct">—</span>
      </div>
      <div class="dash-track"><div class="dash-fill" id="dash-fill" style="width:0%"></div></div>
      <table class="dash-table">
        <thead><tr><th>Integrante</th><th>Estado</th></tr></thead>
        <tbody id="dash-tbody"></tbody>
      </table>
      <div class="dash-actions">
        <button class="dash-btn secondary" onclick="reenviarLinks()">Reenviar links por email</button>
      </div>
      <p class="dash-refresh" id="dash-refresh-txt"></p>
    </div>
  </div>
</div>

<script>
const API = '';
let _familiaId = null;
let _mlToken = null;
let _pollInterval = null;

// ── Magic link flow ──────────────────────────────────────────────────────────

async function solicitarAcceso() {
  const email = document.getElementById('inp-email').value.trim();
  if (!email || !email.includes('@')) {
    mostrarMsg('Ingresá un email válido.', 'error');
    return;
  }
  const btn = document.getElementById('btn-acceder');
  btn.disabled = true;
  btn.textContent = 'Enviando…';
  try {
    const res = await fetch('/auth/magic-link', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'Error');
    mostrarMsg('¡Listo! Revisá tu email — el link llega en segundos.', 'success');
    btn.textContent = 'Enviado ✓';
  } catch (err) {
    mostrarMsg('Error: ' + err.message, 'error');
    btn.disabled = false;
    btn.textContent = 'Enviar link de acceso';
  }
}

function mostrarMsg(txt, tipo) {
  const el = document.getElementById('msg');
  el.textContent = txt;
  el.className = 'msg ' + tipo;
  el.style.display = 'block';
}

// ── Dashboard ────────────────────────────────────────────────────────────────

async function cargarDashboard(mlToken) {
  _mlToken = mlToken;
  try {
    const res = await fetch(`/auth/magic-link/${mlToken}/familia`);
    if (!res.ok) {
      const err = await res.json();
      document.getElementById('login-screen').querySelector('.sub').textContent =
        err.detail || 'El link expiró. Solicitá uno nuevo.';
      return;
    }
    const data = await res.json();
    _familiaId = data.familia_id;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    document.getElementById('dash-nombre-fam').textContent = data.nombre_familia;

    if (data.pdf_url) {
      document.getElementById('dash-pdf-box').style.display = 'block';
      document.getElementById('btn-pdf').dataset.url = data.pdf_url;
    }

    actualizarTabla(data.tokens || []);

    // Poll cada 30s
    _pollInterval = setInterval(pollEstado, 30000);
  } catch (err) {
    mostrarMsg('Error al cargar el libro: ' + err.message, 'error');
  }
}

async function pollEstado() {
  if (!_familiaId || !_mlToken) return;
  try {
    const res = await fetch(`/auth/magic-link/${_mlToken}/familia`);
    if (!res.ok) return;
    const data = await res.json();
    actualizarTabla(data.tokens || []);
    if (data.pdf_url) {
      document.getElementById('dash-pdf-box').style.display = 'block';
      document.getElementById('btn-pdf').dataset.url = data.pdf_url;
    }
    document.getElementById('dash-refresh-txt').textContent =
      'Actualizado ' + new Date().toLocaleTimeString('es-AR', {hour:'2-digit',minute:'2-digit'});
  } catch (_) {}
}

function actualizarTabla(tokens) {
  const total = tokens.length;
  const comp  = tokens.filter(t => t.estado === 'completado').length;
  const pct   = total ? Math.round((comp / total) * 100) : 0;

  document.getElementById('dash-prog-txt').textContent = `${comp} de ${total} historias grabadas`;
  document.getElementById('dash-pct').textContent = pct + '%';
  document.getElementById('dash-fill').style.width = pct + '%';

  const tbody = document.getElementById('dash-tbody');
  tbody.innerHTML = tokens.map(t => {
    let badge = '';
    if (t.estado === 'completado') badge = `<span class="badge-done">✓ Completó</span>`;
    else if (t.estado === 'en_progreso') badge = `<span class="badge-prog">En progreso</span>`;
    else badge = `<span class="badge-pend">Pendiente</span>`;
    return `<tr><td>${t.nombre}</td><td>${badge}</td></tr>`;
  }).join('');
}

function descargarPdf() {
  const url = document.getElementById('btn-pdf').dataset.url;
  if (url) window.open(url, '_blank');
}

async function reenviarLinks() {
  if (!_mlToken) return;
  const btn = event.target;
  btn.disabled = true;
  btn.textContent = 'Enviando…';
  try {
    await fetch(`/auth/magic-link/${_mlToken}/reenviar-links`, { method: 'POST' });
    btn.textContent = 'Links enviados ✓';
    setTimeout(() => { btn.textContent = 'Reenviar links por email'; btn.disabled = false; }, 3000);
  } catch (_) {
    btn.disabled = false;
    btn.textContent = 'Reenviar links por email';
  }
}

// ── Entrada: ¿hay magic link en la URL? ─────────────────────────────────────
(function init() {
  const params = new URLSearchParams(location.search);
  const ml = params.get('ml');
  if (ml) {
    cargarDashboard(ml);
  }
  // Enter en el input
  document.getElementById('inp-email').addEventListener('keydown', e => {
    if (e.key === 'Enter') solicitarAcceso();
  });
})();
</script>
</body>
</html>
