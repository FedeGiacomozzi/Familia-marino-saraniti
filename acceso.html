<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acceso — Ethos Bios</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Mulish:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fdf8f2;--surface:#fff;--border:#e8d9b8;
  --dark:#2C1A0E;--accent:#C4956A;--text:#3d2b0a;--muted:#9a7b5a;
  --cream:#F5EDD8;
}
body{font-family:'Mulish',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}

/* Header */
.hdr{background:var(--dark);padding:14px 20px;display:flex;align-items:center}
.hdr-wordmark{font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--cream);letter-spacing:0.04em;font-weight:500}

/* Main */
.main{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px}
.card{background:var(--surface);border:0.5px solid var(--border);border-radius:16px;padding:2.5rem 2rem;max-width:440px;width:100%}

h1{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:400;color:var(--dark);margin-bottom:8px}
.sub{font-size:14px;color:var(--muted);line-height:1.6;margin-bottom:24px}

label{display:block;font-size:12px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
input[type=email]{width:100%;border:0.5px solid var(--border);border-radius:8px;padding:12px 14px;font-family:'Mulish',sans-serif;font-size:14px;color:var(--text);background:var(--bg);outline:none;transition:border-color .15s;margin-bottom:14px;-webkit-appearance:none}
input[type=email]:focus{border-color:var(--accent)}

.btn{width:100%;background:var(--dark);color:var(--cream);border:none;padding:13px;border-radius:8px;font-family:'Mulish',sans-serif;font-size:14px;font-weight:700;cursor:pointer;letter-spacing:0.04em;transition:opacity .15s}
.btn:hover:not(:disabled){opacity:.88}
.btn:disabled{opacity:.5;cursor:not-allowed}

.msg{font-size:13px;line-height:1.6;padding:12px 14px;border-radius:8px;margin-top:14px;display:none}
.msg-ok{background:#EAF3DE;color:#3B6D11;border:0.5px solid #c3dba8}
.msg-warn{background:#FFF8E0;color:#8B6F0B;border:0.5px solid #e8d49a}
.msg-err{background:#faeeda;color:#854F0B;border:0.5px solid #e8c4a0}
</style>
</head>
<body>

<header class="hdr">
  <span class="hdr-wordmark">Ethos Bios</span>
</header>

<main class="main">
  <div class="card">
    <h1>Accedé a tu libro familiar</h1>
    <p class="sub">Ingresá tu email y te enviamos un link de acceso.</p>

    <label for="email">Email</label>
    <input type="email" id="email" placeholder="tu@email.com" autocomplete="email" inputmode="email">
    <button class="btn" id="btn" onclick="enviar()">Enviar link</button>

    <div class="msg msg-ok" id="msg-ok">Si el email está registrado, recibirás el link en breve.</div>
    <div class="msg msg-warn" id="msg-warn">Esperá unos minutos antes de intentar de nuevo.</div>
    <div class="msg msg-err" id="msg-err">Hubo un problema. Intentá de nuevo.</div>
  </div>
</main>

<script>
function ocultarMensajes() {
  ['msg-ok','msg-warn','msg-err'].forEach(function(id) {
    document.getElementById(id).style.display = 'none';
  });
}

function mostrar(id) {
  ocultarMensajes();
  document.getElementById(id).style.display = 'block';
}

async function enviar() {
  const email = document.getElementById('email').value.trim();
  if (!email) return;
  const btn = document.getElementById('btn');
  btn.disabled = true;
  btn.textContent = 'Enviando…';
  ocultarMensajes();
  try {
    const res = await fetch('/auth/request-link', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({email: email})
    });
    if (res.status === 429) {
      mostrar('msg-warn');
    } else if (res.ok) {
      mostrar('msg-ok');
    } else {
      mostrar('msg-err');
    }
  } catch (_) {
    mostrar('msg-err');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Enviar link';
  }
}

document.getElementById('email').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') enviar();
});
</script>
</body>
</html>
